<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - ChatBox</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Existing Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .chat-page body {
            background: #0a0a0a;
            color: #fff;
        }
        .chat-container-custom {
            max-width: 900px;
            margin: 2rem auto;
            height: calc(100vh - 4rem);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.3);
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(20px);
        }
        @media (max-width: 768px) {
            .chat-container-custom { margin: 1rem; height: calc(100vh - 2rem); border-radius: 0.75rem; }
        }
        .chat-messages { height: 80%; overflow-y: auto; padding: 1.5rem; background: rgba(0,0,0,0.4); }
        .chat-input-form { padding: 1rem; background: rgba(0,0,0,0.6); border-top: 1px solid #333; }
        .input-group .form-control { background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; }
        .input-group .form-control::placeholder { color: #aaa; }
        .btn-primary { background: linear-gradient(45deg, #00c853, #00a843); border: none; }
        .navbar-dark { background: rgba(0,0,0,0.9) !important; }
        .card-header { background: linear-gradient(135deg, #1e3c72, #2a5298) !important; }
    </style>
</head>
<body class="dark-theme">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">ChatBox</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/login">Login</a>
                <a class="nav-link" href="/register">Register</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-0">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 offset-md-1 offset-lg-2">
                <!-- Centered Chat Card -->
                <div class="chat-container-custom card h-100 mb-4">
                    <div class="card-header bg-gradient text-white text-center py-4">
                        <h3 class="mb-1 fw-bold">🤖 AI Chatbot</h3>
                        <small>Your intelligent assistant</small>
                    </div>
                    
                    <!-- Scrollable Messages Area -->
                    <div id="chat-box" class="chat-messages card-body bg-light"></div>
                    
                    <!-- Input Form at Bottom -->
                    <form id="chat-form" class="chat-input-form">
                        <div class="input-group">
                            <input type="text" id="user-input" name="user_message" class="form-control form-control-lg" placeholder="Type your message..." autocomplete="off">
                            <button class="btn btn-primary btn-lg" type="submit">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Chat JS -->
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
