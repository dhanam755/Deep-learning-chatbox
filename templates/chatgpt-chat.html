<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBox - Professional AI Chat</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { 
            background: #0a0a0a; 
            color: #ececec; 
            font-size: 1rem; 
            overflow: hidden;
        }
        .chat-wrapper { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .chat-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: #0a0a0a;
            scrollbar-width: thin;
            scrollbar-color: #444 #1a1a1a;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: #1a1a1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .message { 
            margin-bottom: 1.5rem; 
            display: flex; 
            animation: fadeInUp 0.3s ease; 
        }
        .message.user { justify-content: flex-end; }
        .message-bubble {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            line-height: 1.5;
        }
        .user-bubble { 
            background: linear-gradient(135deg, #00d4aa, #00b894); 
            color: white; 
            border-bottom-right-radius: 0.5rem;
        }
        .bot-bubble { 
            background: #1a1a1a; 
            color: #ececec; 
            border-bottom-left-radius: 0.5rem;
            border: 1px solid #333;
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            margin: 0 0.75rem;
            flex-shrink: 0;
        }
        .bot-avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .input-area {
            padding: 1.5rem 2rem 2rem;
            background: #0f0f0f;
            border-top: 1px solid #333;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .input-group .form-control {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #ececec;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            font-size: 1rem;
        }
        .input-group .form-control::placeholder { color: #666; }
        .send-btn {
            background: linear-gradient(135deg, #00d4aa, #00b894);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            margin-left: 1rem;
            flex-shrink: 0;
        }
        .typing { opacity: 0.7; font-style: italic; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .chat-messages { padding: 1rem; }
            .input-area { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <!-- Header -->
        <div class="chat-header d-flex align-items-center">
            <h1 class="mb-0 fw-600 fs-4 me-auto">ChatBox AI</h1>
            <a href="/logout" class="btn btn-outline-light btn-sm px-3 py-1">Logout</a>
        </div>

        <!-- Messages -->
        <div id="chat-box" class="chat-messages"></div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="user-input" class="form-control" placeholder="Message ChatBox AI..." autocomplete="off">
                <button class="btn send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ChatGPT-style JS -->
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            userInput.value = '';

            const typing = appendMessage('ChatBox AI is typing', 'bot typing');
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                typing.remove();
                
                appendMessage(data.response || 'Sorry, no response.', 'bot');
                
            } catch (error) {
                typing.remove();
                appendMessage('Connection error. Please try again.', 'bot');
            }
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if (type === 'user') {
                div.innerHTML = `
                    <div class="message-bubble user-bubble">${text}</div>
                `;
            } else {
                div.innerHTML = `
                    <div class="message-avatar bot-avatar"></div>
                    <div class="message-bubble bot-bubble">${text}</div>
                `;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize input
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    </script>
</body>
</html>
