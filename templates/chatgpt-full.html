 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBox AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/chatgpt.css') }}" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%); 
            color: #e2e8f0; 
            font-size: 1rem; 
            overflow: hidden;
            margin: 0;
        }
        .app-container { height: 100vh; display: flex; }
        
        /* Sidebar */
        .sidebar { 
            width: 260px; 
            background: #0f172a; 
            border-right: 1px solid #334155; 
            transition: transform 0.3s ease;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid #334155; }
        .new-chat-btn { 
            width: 100%; 
            background: #10b981; 
            color: white; 
            border: none; 
            border-radius: 0.5rem; 
            padding: 0.75rem; 
            font-weight: 500;
        }
        .new-chat-btn:hover { background: #059669; }
        .chat-history { max-height: calc(100vh - 140px); overflow-y: auto; padding: 0.5rem; }
        .chat-item { 
            padding: 0.75rem 1rem; 
            cursor: pointer; 
            border-radius: 0.5rem; 
            margin-bottom: 0.25rem;
            transition: background 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: #1e293b; }
        .chat-item-title { font-weight: 500; margin-bottom: 0.25rem; }
        .chat-item-preview { font-size: 0.875rem; opacity: 0.7; }
        
        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .top-bar { 
            height: 64px; 
            background: rgba(15, 23, 42, 0.8); 
            border-bottom: 1px solid #334155; 
            display: flex; 
            align-items: center; 
            padding: 0 2rem; 
            gap: 1rem;
        }
        .logo { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #1e40af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .model-selector { min-width: 140px; }
        .user-menu { margin-left: auto; }
        .chat-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 2rem; 
            background: #0a0a0a; 
            scrollbar-width: thin; 
            scrollbar-color: #475569 #1e293b;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-track { background: #1e293b; }
        .chat-area::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .message { margin-bottom: 1.75rem; opacity: 0; animation: slideIn 0.4s forwards; }
        .message.user { margin-left: auto; max-width: 70%; }
        .message.bot { max-width: 70%; }
        .message-bubble { 
            padding: 1rem 1.25rem; 
            border-radius: 1.375rem; 
            line-height: 1.5; 
            word-wrap: break-word;
        }
        .user-bubble { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white;
            border-bottom-right-radius: 0.375rem;
        }
        .bot-bubble { 
            background: #1e293b; 
            color: #e2e8f0; 
            border: 1px solid #334155;
            border-bottom-left-radius: 0.375rem;
        }
        .message-actions { margin-top: 0.5rem; opacity: 0.7; font-size: 0.875rem; }
        .message-actions button { background: none; border: none; color: inherit; padding: 0.25rem 0.5rem; border-radius: 0.25rem; cursor: pointer; }
        .message-actions button:hover { background: rgba(255,255,255,0.1); }
        .avatar { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 600; 
            font-size: 0.875rem;
        }
        .bot-avatar { background: linear-gradient(135deg, #3b82f6, #1e40af); color: white; }
        
        /* Input */
        .input-container { 
            padding: 1.5rem 2rem 2rem; 
            background: #0f172a; 
            border-top: 1px solid #334155; 
        }
        .input-field { 
            background: #1e293b; 
            border: 1px solid #334155; 
            color: #e2e8f0; 
            border-radius: 1.5rem; 
            padding: 1rem 1.5rem; 
            font-size: 1rem;
        }
        .input-field::placeholder { color: #64748b; }
        .send-btn { 
            background: linear-gradient(135deg, #3b82f6, #1e40af); 
            border: none; 
            border-radius: 50%; 
            width: 44px; 
            height: 44px; 
            margin-left: 1rem;
        }
        .typing-indicator { display: flex; align-items: center; gap: 0.5rem; }
        .typing-dots { display: flex; gap: 0.25rem; }
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #64748b; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        /* Animations */
        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes typing {
            0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 1000; height: 100vh; }
            .chat-area { padding: 1rem; }
            .input-container { padding: 1rem; }
            .top-bar { padding: 0 1rem; }
        }
        .sidebar-toggle { 
            display: none !important; 
        }
        @media (max-width: 768px) { 
            .sidebar-toggle { 
                display: block !important; 
            } 
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header d-flex align-items-center gap-2">
                <button class="sidebar-toggle btn btn-link p-0 d-md-none" onclick="toggleSidebar()">
                    <i class="fas fa-bars text-white fs-5"></i>
                </button>
                <button class="new-chat-btn" onclick="newChat()">
                    <i class="fas fa-plus me-2"></i>New Chat
                </button>
            </div>
            <div id="chat-history" class="chat-history"></div>
        </div>
        
        <!-- Overlay for mobile sidebar -->
        <div id="sidebar-overlay" class="d-none position-fixed w-100 h-100 bg-dark bg-opacity-50 z-3" style="top:0;left:0;" onclick="toggleSidebar()"></div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-link text-white p-0 sidebar-toggle d-md-none" onclick="toggleSidebar()">
                        <i class="fas fa-bars fs-5"></i>
                    </button>
                    <div class="logo">ChatBox AI</div>
                </div>
                <div class="model-selector">
                    <select class="form-select form-select-sm bg-dark text-light border-dark">
                        <option>Custom GPT</option>
                        <option>Groq Fast</option>
                    </select>
                </div>
                <div class="user-menu">
                    <button class="btn btn-link text-light p-1" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div id="chat-area" class="chat-area"></div>
            
            <!-- Input Area -->
            <div class="input-container">
                <div class="input-group">
                    <input type="text" id="message-input" class="form-control input-field flex-grow-1" placeholder="Send a message...">
                    <button class="btn send-btn" onclick="sendMessage()">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let chats = [];
        let currentChatId = -1;
        let isLoading = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadChats();
            if (chats.length > 0) {
                selectChat(0);
            } else {
                addWelcomeMessage();
            }
        });

        // Load chat history
        async function loadChats() {
            try {
                const res = await fetch('/api/history');
                chats = await res.json();
                renderChatHistory();
            } catch (e) {
                console.error('Load chats error:', e);
            }
        }

        // Render sidebar history
        function renderChatHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = '';
            chats.forEach((chat, index) => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === index ? 'active' : ''}`;
                div.onclick = () => selectChat(index);
                div.innerHTML = `
                    <div class="chat-item-title">${chat.user?.slice(0,30)}...</div>
                    <div class="chat-item-preview">${chat.bot?.slice(0,50)}...</div>
                `;
                container.appendChild(div);
            });
        }

        // Select chat
        function selectChat(index) {
            currentChatId = index;
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML = '';
            
            const chat = chats[index];
            appendMessage(chat.user, 'user');
            appendMessage(chat.bot, 'bot');
            
            renderChatHistory();
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // New chat
        function newChat() {
            chats.unshift({ user: '', bot: '' });
            currentChatId = 0;
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML = '';
            addWelcomeMessage();
            renderChatHistory();
        }

        // Welcome
        function addWelcomeMessage() {
            const welcome = `👋 Hello! I'm ChatBox AI, your professional assistant. How can I help you today?`;
            appendMessage(welcome, 'bot');
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message || isLoading) return;

            input.value = '';
            appendMessage(message, 'user');

            const typing = appendTypingIndicator();
            isLoading = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                
                typing.remove();
                appendMessage(data.response || 'No response received.', 'bot');
                
                // Save chat
                if (currentChatId >= 0) {
                    chats[currentChatId] = { user: message, bot: data.response };
                } else {
                    chats.push({ user: message, bot: data.response });
                    currentChatId = chats.length - 1;
                }
                renderChatHistory();
                
            } catch (e) {
                typing.remove();
                appendMessage('Sorry, connection error. Please try again.', 'bot');
            }
            
            isLoading = false;
        }

        // Append message
        function appendMessage(text, type) {
            const chatArea = document.getElementById('chat-area');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if (type === 'user') {
                div.innerHTML = `<div class="message-bubble user-bubble">${text}</div>`;
            } else {
                div.innerHTML = `
                    <div class="avatar bot-avatar">AI</div>
                    <div class="message-bubble bot-bubble">
                        ${text}
                        <div class="message-actions mt-2">
                            <button onclick="copyMessage(this)"><i class="fas fa-copy me-1"></i>Copy</button>
                            <button onclick="regenerateResponse(this)"><i class="fas fa-redo me-1"></i>Regenerate</button>
                        </div>
                    </div>
                `;
            }
            
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        // Typing indicator
        function appendTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message bot typing-indicator';
            div.innerHTML = `
                <div class="avatar bot-avatar">AI</div>
                <div class="message-bubble bot-bubble">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            document.getElementById('chat-area').appendChild(div);
            document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
            return div;
        }

        // Copy
        function copyMessage(btn) {
            const text = btn.closest('.bot-bubble').querySelector('.message-actions').previousElementSibling.textContent;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="fas fa-check me-1"></i>Copied!';
                setTimeout(() => btn.innerHTML = '<i class="fas fa-copy me-1"></i>Copy', 2000);
            });
        }

        // Regenerate (placeholder)
        function regenerateResponse(btn) {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Regenerating...';
            // Implement regenerate logic here
            setTimeout(() => btn.innerHTML = '<i class="fas fa-redo me-1"></i>Regenerate', 1500);
        }

        // Sidebar toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            document.getElementById('sidebar-overlay').classList.toggle('d-none');
        }

        // Logout
        function logout() {
            window.location.href = '/logout';
        }

        // Enter key send
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea (if changed to textarea)
        document.getElementById('message-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    </script>
</body>
</html>
