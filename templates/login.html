<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            font-family: Arial;
            background:#696969;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:300px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#2F4F4F;
            border:none;
            color:white;
            cursor:pointer;
        }

        a{
            text-decoration:none;
            color:#228B22;
        }

        p{
            text-align:center;
        }
    </style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>

<p><a href="/register">Register</a></p>

</div>

</body>
</html>
