<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChatBox</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        .login-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="dark-theme login-page">
    <div class="login-hero">
        <div class="dark-card card text-center p-4">
            <div class="card-body">
                <div class="brand-logo mb-4">ChatBox</div>
                
                <h2 class="h3 mb-4 fw-bold">Welcome Back</h2>
                <p class="text-light mb-4 opacity-75">Sign in to your account</p>
                
                <form method="POST" novalidate>
                    <div class="password-toggle mb-4">
                        <label for="email" class="form-label fw-semibold text-start d-block mb-2">Email Address</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="password-toggle mb-4">
                        <label for="password" class="form-label fw-semibold text-start d-block mb-2">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="btn-toggle">Show</button>
                    </div>
                    
                    <button type="submit" class="btn btn-primary dark-btn btn-lg w-100 mb-3 fw-semibold py-3">
                        Sign In
                    </button>
                </form>
                
                <div class="d-flex justify-content-between align-items-center">
                    <a href="#" class="text-decoration-none text-light opacity-75 small">Forgot Password?</a>
                    <a href="/register" class="btn btn-link p-0 text-success fw-semibold">Create Account</a>
                </div>
                
                <hr class="my-4 opacity-25">
                <p class="opacity-75 small mb-0">By signing in, you agree to our Terms of Service and Privacy Policy.</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Custom Login JS -->
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
